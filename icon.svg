<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (no rx so iOS auto-rounds) -->
  <rect width="512" height="512" fill="#F59E0B"/>

  <!-- Cat face (left) - tuxedo (hachiware) style like the reference -->
  <g transform="translate(120, 100)">
    <!-- White face base -->
    <ellipse cx="80" cy="125" rx="80" ry="72" fill="#FFFFFF"/>
    <!-- Black mask (forehead + around eyes + ears) -->
    <path d="M 12 90
             Q 8 50 20 30
             L 50 100
             L 80 75
             L 110 100
             L 140 30
             Q 152 50 148 90
             Q 148 145 130 145
             Q 110 130 95 130
             L 80 130
             L 65 130
             Q 50 130 30 145
             Q 12 145 12 90 Z"
          fill="#1F2937"/>
    <!-- Ears (black outer) -->
    <polygon points="5,35 35,15 50,90" fill="#1F2937"/>
    <polygon points="155,35 125,15 110,90" fill="#1F2937"/>
    <!-- Inner ear (pink triangle) -->
    <polygon points="20,45 35,30 38,75" fill="#FCA5A5"/>
    <polygon points="140,45 125,30 122,75" fill="#FCA5A5"/>
    <!-- Eyes (white circles in black mask) -->
    <circle cx="50" cy="115" r="11" fill="#FFFFFF"/>
    <circle cx="110" cy="115" r="11" fill="#FFFFFF"/>
    <circle cx="50" cy="115" r="5" fill="#1F2937"/>
    <circle cx="110" cy="115" r="5" fill="#1F2937"/>
    <!-- Nose (pink) -->
    <path d="M 72 142 Q 80 152 88 142 L 80 152 Z" fill="#F472B6"/>
    <!-- Mouth -->
    <path d="M 80 152 Q 73 162 65 158" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 152 Q 87 162 95 158" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <line x1="8" y1="145" x2="42" y2="148" stroke="#1F2937" stroke-width="2"/>
    <line x1="10" y1="158" x2="42" y2="156" stroke="#1F2937" stroke-width="2"/>
    <line x1="118" y1="148" x2="152" y2="145" stroke="#1F2937" stroke-width="2"/>
    <line x1="118" y1="156" x2="150" y2="158" stroke="#1F2937" stroke-width="2"/>
  </g>

  <!-- Dog face (right) - white Japanese dog with floppy ears -->
  <g transform="translate(290, 100)">
    <!-- Floppy ears (vertical ellipse hanging down beside the head) -->
    <ellipse cx="25" cy="140" rx="20" ry="55" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2.5"/>
    <ellipse cx="135" cy="140" rx="20" ry="55" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2.5"/>
    <!-- Head (white) -->
    <ellipse cx="80" cy="125" rx="72" ry="68" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2"/>
    <!-- Snout area (slightly cream) -->
    <ellipse cx="80" cy="155" rx="38" ry="26" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Eyes (black) -->
    <circle cx="55" cy="115" r="9" fill="#1F2937"/>
    <circle cx="105" cy="115" r="9" fill="#1F2937"/>
    <!-- Eye highlight -->
    <circle cx="57" cy="112" r="2.5" fill="#FFFFFF"/>
    <circle cx="107" cy="112" r="2.5" fill="#FFFFFF"/>
    <!-- Nose (black) -->
    <ellipse cx="80" cy="142" rx="11" ry="8" fill="#1F2937"/>
    <!-- Mouth -->
    <path d="M 80 150 L 80 165" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 80 165 Q 65 173 55 168" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 165 Q 95 173 105 168" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text "食事管理" -->
  <text x="256" y="380" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif"
        font-weight="900" font-size="100" fill="#FFFFFF"
        stroke="#92400E" stroke-width="3" paint-order="stroke">食事管理</text>
  <text x="256" y="455" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,sans-serif"
        font-weight="700" font-size="40" fill="rgba(255,255,255,0.9)">くぅ式</text>
</svg>
