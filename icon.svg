<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (no rx so iOS auto-rounds) -->
  <rect width="512" height="512" fill="#F59E0B"/>

  <!-- Cat face (left) -->
  <g transform="translate(120, 110)">
    <polygon points="0,40 30,140 80,90" fill="#FFFFFF"/>
    <polygon points="160,40 130,140 80,90" fill="#FFFFFF"/>
    <polygon points="15,55 32,125 70,95" fill="#F472B6"/>
    <polygon points="145,55 128,125 90,95" fill="#F472B6"/>
    <ellipse cx="80" cy="120" rx="78" ry="68" fill="#FFFFFF"/>
    <circle cx="52" cy="115" r="9" fill="#1F2937"/>
    <circle cx="108" cy="115" r="9" fill="#1F2937"/>
    <polygon points="80,135 72,148 88,148" fill="#F472B6"/>
    <path d="M 65 152 Q 80 162 95 152" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="10" y1="138" x2="48" y2="142" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="112" y1="142" x2="150" y2="138" stroke="#1F2937" stroke-width="2.5"/>
  </g>

  <!-- Dog face (right) -->
  <g transform="translate(290, 110)">
    <ellipse cx="20" cy="80" rx="22" ry="50" fill="#92400E"/>
    <ellipse cx="140" cy="80" rx="22" ry="50" fill="#92400E"/>
    <ellipse cx="80" cy="120" rx="72" ry="68" fill="#FCD34D"/>
    <ellipse cx="80" cy="148" rx="38" ry="28" fill="#FEF3C7"/>
    <circle cx="55" cy="110" r="9" fill="#1F2937"/>
    <circle cx="105" cy="110" r="9" fill="#1F2937"/>
    <ellipse cx="80" cy="135" rx="10" ry="7" fill="#1F2937"/>
    <path d="M 80 145 L 80 158" stroke="#1F2937" stroke-width="3" stroke-linecap="round"/>
    <path d="M 80 158 Q 65 168 55 162" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 80 158 Q 95 168 105 162" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text "食事管理" -->
  <text x="256" y="380" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif"
        font-weight="900" font-size="100" fill="#FFFFFF"
        stroke="#92400E" stroke-width="3" paint-order="stroke">食事管理</text>
  <text x="256" y="455" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,sans-serif"
        font-weight="700" font-size="40" fill="rgba(255,255,255,0.9)">くぅ式</text>
</svg>
