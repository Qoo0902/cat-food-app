<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background (no rx so iOS auto-rounds) -->
  <rect width="512" height="512" fill="#F59E0B"/>

  <!-- Cat face (left) - hachiware style matching reference image -->
  <g transform="translate(120, 100)">
    <!-- White face base -->
    <ellipse cx="80" cy="125" rx="80" ry="72" fill="#FFFFFF"/>
    <!-- Ears (black outer triangles) -->
    <polygon points="8,30 45,12 52,95" fill="#1F2937"/>
    <polygon points="152,30 115,12 108,95" fill="#1F2937"/>
    <!-- Inner ear (white triangle, like reference) -->
    <polygon points="22,40 42,28 45,80" fill="#FFFFFF"/>
    <polygon points="138,40 118,28 115,80" fill="#FFFFFF"/>
    <!-- Black mask: forehead + eye area, with central white "V" parting -->
    <!-- Left half of mask -->
    <path d="M 8 30
             L 52 95
             Q 50 130 35 138
             Q 18 138 10 120
             Q 5 80 8 30 Z"
          fill="#1F2937"/>
    <!-- Right half of mask -->
    <path d="M 152 30
             L 108 95
             Q 110 130 125 138
             Q 142 138 150 120
             Q 155 80 152 30 Z"
          fill="#1F2937"/>
    <!-- Top center black accent (small triangle pointing down) -->
    <polygon points="62,55 80,75 98,55" fill="#1F2937"/>
    <!-- Eyes (large white circles with black pupils & highlight) -->
    <circle cx="48" cy="118" r="12" fill="#FFFFFF"/>
    <circle cx="112" cy="118" r="12" fill="#FFFFFF"/>
    <circle cx="48" cy="118" r="6" fill="#1F2937"/>
    <circle cx="112" cy="118" r="6" fill="#1F2937"/>
    <circle cx="50" cy="116" r="2" fill="#FFFFFF"/>
    <circle cx="114" cy="116" r="2" fill="#FFFFFF"/>
    <!-- Nose (small pink triangle) -->
    <path d="M 73 145 L 87 145 L 80 154 Z" fill="#F472B6"/>
    <!-- Mouth (omega shape) -->
    <path d="M 80 154 Q 73 162 66 159" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 154 Q 87 162 94 159" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Whiskers (3 each side) -->
    <line x1="6" y1="142" x2="40" y2="146" stroke="#1F2937" stroke-width="2"/>
    <line x1="6" y1="152" x2="40" y2="153" stroke="#1F2937" stroke-width="2"/>
    <line x1="8" y1="162" x2="40" y2="160" stroke="#1F2937" stroke-width="2"/>
    <line x1="120" y1="146" x2="154" y2="142" stroke="#1F2937" stroke-width="2"/>
    <line x1="120" y1="153" x2="154" y2="152" stroke="#1F2937" stroke-width="2"/>
    <line x1="120" y1="160" x2="152" y2="162" stroke="#1F2937" stroke-width="2"/>
  </g>

  <!-- Dog face (right) - white Japanese dog with floppy ears -->
  <g transform="translate(290, 100)">
    <!-- Floppy ears (vertical ellipse hanging down beside the head) -->
    <ellipse cx="25" cy="140" rx="20" ry="55" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2.5"/>
    <ellipse cx="135" cy="140" rx="20" ry="55" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2.5"/>
    <!-- Head (white) -->
    <ellipse cx="80" cy="125" rx="72" ry="68" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2"/>
    <!-- Snout area (slightly cream) -->
    <ellipse cx="80" cy="155" rx="38" ry="26" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Eyes (black) -->
    <circle cx="55" cy="115" r="9" fill="#1F2937"/>
    <circle cx="105" cy="115" r="9" fill="#1F2937"/>
    <!-- Eye highlight -->
    <circle cx="57" cy="112" r="2.5" fill="#FFFFFF"/>
    <circle cx="107" cy="112" r="2.5" fill="#FFFFFF"/>
    <!-- Nose (black) -->
    <ellipse cx="80" cy="142" rx="11" ry="8" fill="#1F2937"/>
    <!-- Mouth -->
    <path d="M 80 150 L 80 165" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 80 165 Q 65 173 55 168" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 165 Q 95 173 105 168" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text "食事管理" -->
  <text x="256" y="380" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif"
        font-weight="900" font-size="100" fill="#FFFFFF"
        stroke="#92400E" stroke-width="3" paint-order="stroke">食事管理</text>
  <text x="256" y="455" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,sans-serif"
        font-weight="700" font-size="40" fill="rgba(255,255,255,0.9)">くぅ式</text>
</svg>
